---
name: Test

permissions:
  contents: read
  id-token: write

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '10.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Clean previous test artifacts
        run: |
          rm -rf ./TestResults ./coverage

      - name: Run tests with coverage
        run: |
          dotnet test \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --settings ./FeedCord.Tests/coverlet.runsettings \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=test-results.trx"

      - name: Prepare coverage report for Codecov
        if: always()
        run: |
          mkdir -p coverage
          coverage_file=$(find ./TestResults -type f -name 'coverage.cobertura.xml' | head -n 1)
          if [ -z "$coverage_file" ]; then
            echo "No coverage.cobertura.xml found in ./TestResults"
            exit 0
          fi
          cp "$coverage_file" ./coverage/coverage.cobertura.xml
          echo "Prepared $coverage_file -> ./coverage/coverage.cobertura.xml"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-10.0
          path: './TestResults/**/*.trx'
          if-no-files-found: warn

      - name: Convert TRX to JUnit XML
        if: always()
        run: |
          dotnet tool update --global trx2junit --version 2.1.0 || dotnet tool install --global trx2junit --version 2.1.0
          export PATH="$PATH:$HOME/.dotnet/tools"
          mkdir -p ./TestResults/junit
          trx_files=$(find ./TestResults -type f -name '*.trx')
          if [ -z "$trx_files" ]; then
            echo "No .trx files found in ./TestResults"
            exit 0
          fi
          for trx_file in $trx_files; do
            filename=$(basename "$trx_file" .trx)
            trx2junit "$trx_file" --output "./TestResults/junit/${filename}.xml"
          done

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit-results-10.0
          path: './TestResults/junit/*.xml'
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          use_oidc: true
          files: './coverage/coverage.cobertura.xml'
          disable_search: true
          report_type: coverage
          flags: unittests
          fail_ci_if_error: true
          verbose: true

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          use_oidc: true
          files: './TestResults/junit/*.xml'
          report_type: test_results
          flags: unittests
          fail_ci_if_error: false
          verbose: true
